<!DOCTYPE html>
<html>
<head>
    <title>Smart Autocorrect Keyboard</title>
    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1>Smart Autocorrect Keyboard</h1>

    <form method="POST">

        <textarea
            name="text"
            placeholder="Enter text here..."
            required></textarea>

        <br>

        <button type="submit">
            Predict
        </button>

    </form>

    {% if corrected_text %}

    <div class="result">

        <h2>Corrected Text</h2>

        <p>{{ corrected_text }}</p>

        <h2>Next Word Suggestions</h2>

        <ul>

        {% for word, confidence in suggestions %}

            <li>
                {{ word }}
                ({{ confidence }}%)
            </li>

        {% endfor %}

        </ul>

    </div>

    {% endif %}

</div>

</body>
</html>
